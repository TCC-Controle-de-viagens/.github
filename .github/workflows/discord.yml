name: Discord Notifications

on:
  push:
    branches: [ "*" ]
  pull_request:
    types: [opened, closed, reopened, review_requested]
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created]
  # O segredo do Project V2 é deixar as chaves vazias se não for filtrar tipos
  project_v2_item: {} 
  release:
    types: [published]
  workflow_dispatch: 
  create: 
  delete: 

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Actions Discord Webhook
        uses: nebularg/actions-discord-webhook@v1.0.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: |
            **🔔 Nova atividade no GitHub!**
            **Evento:** ${{ github.event_name }}
            **Repositório:** ${{ github.repository }}
            **Autor:** ${{ github.actor }}
            **Detalhes:** https://github.com/${{ github.repository }}
          color: "00ff00"