name: Discord Notifications

on:
  push:
    branches: [ "*" ]
  pull_request:
    types: [opened, closed, reopened, review_requested]
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created]
  project_v2_item:
    types: [created, edited, converted, deleted, restored]
  release:
    types: [published]
  workflow_dispatch: # Permite disparar manualmente se quiser testar
  create: # Avisa quando criam branches ou tags novas
  delete: # Avisa quando deletam branches ou tags

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Actions Discord Webhook
        uses: nebularg/actions-discord-webhook@v1.0.0
        with:
          webhook_url: ${{https://discord.com/api/webhooks/1477813257120120952/mc-OXly6Y5jv_UE2TdmS0vhYLG53sM5XTg8k5hRVRTmwOSfEhF6ei4UfyPzWxoVQPL-V}}
          status: ${{ job.status }}
          content: "**Nova atividade no GitHub!** \n**Evento:** ${{ github.event_name }} \n**Repositório:** ${{ github.repository }} \n**Autor:** ${{ github.actor }} \n**Detalhes:** Confira a movimentação em: https://github.com/${{ github.repository }}"
          color: "00ff00"
